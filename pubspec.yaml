name: export_video_frame
description: A Flutter plugin for iOS and Android for exporting picture from video file.
version: 0.0.7
homepage: https://github.com/animeng/flutter_export_video_frame

environment:
  sdk: ">=2.12.0 <3.0.0"
  flutter: ">=1.12.0"

dependencies:

  #  since these fuckers at media info aren't updating the package i have to depend on other peoples pacakges
  media_info:
    git:
      url: https://github.com/AkiUnleash/flutter_plugin_media_info.git
      ref: main

  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.mengtnt.export_video_frame
        pluginClass: ExportVideoFramePlugin
      ios:
        pluginClass: ExportVideoFramePlugin
